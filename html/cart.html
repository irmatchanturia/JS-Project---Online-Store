<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/main-page.css" />
    <link rel="stylesheet" href="../css/cart.css" />
  </head>
  <body>
    <div id="header" style="position: fixed; width: 100%; z-index: 1000"></div>
    <div class="cart-head">
      <h1>Your Cart</h1>
      <a href="main-page.html">⬅ Continue Shopping</a>
    </div>
    <div class="cart">
  <div class="cart-products"></div>

  <div class="cart-side">
    <h4>Order Summary</h4>

    <div class="summary-row">
      <p>Subtotal</p>
      <span class="subtotal">$0</span>
    </div>

    <div class="summary-row">
      <p>Discount</p>
      <span class="discount">-$0</span>
    </div>

    <div class="summary-total">
      <h5>Total</h5>
      <span class="total">$0</span>
    </div>

    <a class="checkout-btn" href="#">Secure Checkout</a>

    <div class="cart-payment">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png" />
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" />
      <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" />
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Google_Pay_Logo.svg" />
    </div>
  </div>
</div>

    </div>
    <div id="footer"></div>
    <script src="../js/header.js"></script>
    <script src="../js/cart.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("header.html")
          .then((res) => res.text())
          .then((data) => {
            document.getElementById("header").innerHTML = data;
            setUpHeader();
            Search();
          });
      });
    </script>

    <script>
      async function loadFooter() {
        const response = await fetch("footer.html");
        const footerHTML = await response.text();

        document.getElementById("footer").innerHTML = footerHTML;
      }

      loadFooter();
    </script>
  </body>
</html>
